[tox]  # -------------------------------------------------------------------------------

envlist = check, py{3.10,3.11,3.12}{,-beartype,-lint}, py{3.13,3.13t,3.14,3.14t}{,-beartype}, py{3.13,3.14}-lint, pypy{3.10,3.11}
skipsdist = true
skip_missing_interpreters = true

[gh-actions]  # ------------------------------------------------------------------------

python =
  3.10: py3.10{,-beartype,-lint}
  3.11: py3.11{,-beartype,-lint}
  3.12: py3.12{,-beartype,-lint}
  3.13: py3.13{,-beartype,-lint}
  3.13t: py3.13t{,-beartype}
  3.14: py3.14{,-beartype,-lint}
  3.14t: py3.14t{,-beartype}
  pypy-3.10: pypy3.10
  pypy-3.11: pypy3.11
fail_on_no_env = True

[testenv]  # ---------------------------------------------------------------------------

commands =
  pytest --cov=dyce --durations 5 --numprocesses {env:NUMBER_OF_PROCESSORS:auto} {posargs}
deps =
  --editable .
  !pypy3.10-!pypy3.11: numpy  # see <https://github.com/beartype/beartype/issues/324>
  pytest
  # Because ${HOME} is not passed, ~/.gitconfig is not read. To overcome this, port any
  # desired user-specific exclusion configuration to .git/config. E.G.:
  #
  #   [core]
  #   excludesfile = /home/username/.gitignore
  #
  # Alternatively, add entries directly to .git/info/exclude. See also mkdocs-exclude
  # below.
  pytest-gitignore
  debug: debugpy
  debug: ipython
  !debug: pytest-cov
  !debug: pytest-xdist
  sympy
passenv =
  PYTHONBREAKPOINT
setenv =
  beartype: NUMERARY_BEARTYPE = yes
  !beartype: NUMERARY_BEARTYPE = no
  PYTHONWARNINGS = {env:PYTHONWARNINGS:ignore}

[testenv:py{3.10,3.11,3.12}-debug, py{3.13,3.14}{,t}-debug, pypy{3.10,3.11}-debug]  # --

commands =
  pytest --capture=no --pdb --pdbcls=IPython.terminal.debugger:TerminalPdb {posargs}

[testenv:assets]  # --------------------------------------------------------------------

base_python = 3.13  # should match python-version in GitHub Actions config
commands =
  make -C docs/assets -j {env:NUMBER_OF_PROCESSORS:6}
  make -C docs/assets perf
deps =
  --editable .
  anydyce~=0.4.6  # for docs/assets/plot….py
  graphviz
  jinja2  # for pandas DataFrame styles
  matplotlib
  pandas
  sympy
  pygraphviz
  # pylint contains pyreverse
  pylint
allowlist_externals =
  make

[testenv:check]  # ---------------------------------------------------------------------

base_python = 3.13  # should match python-version in GitHub Actions config
commands =
  git clean -X -d --force -- docs site
  cp LICENSE docs/license.md
  cp README.md docs/index.md
  jupyter lite build --output-dir docs/jupyter
  mkdocs build --strict
  python3 -m pip wheel --no-deps --wheel-dir dist .
  twine check dist/*
deps =
  --editable .
  jupyterlab_server
  jupyterlite~=0.7
  jupyterlite-pyodide-kernel
  pkginfo
  mike
  # See <https://github.com/mkdocs/mkdocs/issues/2448>
  # See <https://github.com/mkdocstrings/mkdocstrings/issues/295>
  mkdocs!=1.2
  mkdocs-macros-plugin
  mkdocs-material
  mkdocstrings-python
  sympy
  twine
  versioningit
allowlist_externals =
  cp
  git
  rm

[testenv:jupyter]  # -------------------------------------------------------------------

commands =
  jupyter-lab {posargs}
deps =
  --editable .
  jupyterlab

[testenv:py{3.10,3.11,3.12,3.13,3.14}-lint]  # -----------------------------------------

commands =
  pre-commit run --all-files --show-diff-on-failure
  mypy --config-file={toxinidir}/pyproject.toml --warn-unused-ignores .
  {toxinidir}/helpers/mypy-doctests.py -a=--config-file={toxinidir}/pyproject.toml .
deps =
  --editable .
  mypy~=1.0
  pre-commit
  sympy
setenv =
  # Disable pip's cachecontrol to avoid read-timeout hangs in sandboxes
  PIP_NO_CACHE_DIR = 1
allowlist_externals =
  {toxinidir}/helpers/mypy-doctests.py
