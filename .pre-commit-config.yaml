repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-toml
      - id: check-vcs-permalinks
      - id: check-yaml
        args: [--unsafe]
      - id: debug-statements
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
        # See <https://docs.python.org/3/library/re.html#re.X>
        exclude: |
          (?x)^(
            docs/(
              dyce-powered\.svg|
              assets/perf_.*\.txt
            )
          )$
      - id: trailing-whitespace
        # See <https://docs.python.org/3/library/re.html#re.X>
        exclude: |
          (?x)^(
            docs/(
              dyce-powered\.svg|
              assets/perf_.*\.txt
            )
          )$

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args: [--toml, pyproject.toml]
        additional_dependencies:
          - tomli

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: meta
    hooks:
    - id: check-useless-excludes

  - repo: local
    hooks:
      - id: ty
        name: ty
        # entry: .venv/bin/ty
        entry: ty
        args: [check]
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: pyrefly
        name: pyrefly
        entry: pyrefly
        # entry: .venv/bin/pyrefly
        args: [check, --warn, unused-ignore]
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: pyright
        name: pyright
        entry: pyright
        # entry: .venv/bin/pyright
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: mypy
        name: mypy
        entry: mypy
        # entry: .venv/bin/mypy
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: check-doctests
        name: check-doctests
        entry: ./helpers/check-doctests.py
        args: [check]
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: check-doctests
        name: check-doctests-format
        entry: ./helpers/check-doctests.py
        args: [format]
        language: system
        pass_filenames: false
        stages: [pre-push]
