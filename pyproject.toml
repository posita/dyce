[project]  # ---------------------------------------------------------------------------

name = "dyce"
dynamic = ["version"]
description = "Simple Python tools for exploring dice outcomes and other finite discrete probabilities"
readme = {file = "README.md", content-type = "text/markdown; charset=UTF-8"}
license = "MIT"
license-files = ["LICENSE"]
authors = [{name = "Matt Bogosian", email = "matt@bogosian.net"}]
requires-python = ">=3.10"
dependencies = ["numerary~=0.4.3"]
classifiers = [
  "Topic :: Education",
  "Topic :: Games/Entertainment",
  "Topic :: Scientific/Engineering :: Mathematics",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Typing :: Typed",
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Intended Audience :: Education",
  "Intended Audience :: Science/Research",
  "Operating System :: OS Independent",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Programming Language :: Python :: Implementation :: CPython",
  "Programming Language :: Python :: Implementation :: PyPy",
]

[project.optional-dependencies]  # -----------------------------------------------------

dev = [
  "numpy",
  "pandas",
  "pre-commit",
  "sympy",
  "tox",
  "tox-uv",
  "versioningit",
  # TODO(posita): Remove when retiring support for 3.10
  "tomli; python_version < '3.11'",
]

[project.urls]  # ----------------------------------------------------------------------

Homepage = "https://posita.github.io/dyce/"
"Source Repository" = "https://github.com/posita/dyce/"

[build-system]  # ----------------------------------------------------------------------

requires = ["setuptools>=61", "versioningit", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]  # -------------------------------------------------------------------

packages = ["dyce"]

[tool.setuptools.package-data]  # ------------------------------------------------------

dyce = ["py.typed"]

[tool.mypy]  # -------------------------------------------------------------------------

# See <https://mypy.readthedocs.io/en/stable/config_file.html#confval-exclude>
exclude = """(?x)(
  (^|/)build/
  | (^|/)site/
)"""
warn_redundant_casts = true
warn_unused_configs = true
warn_unused_ignores = true
# warn_return_any = true
warn_unreachable = true

[tool.pytest.ini_options]  # -----------------------------------------------------------

addopts = "--doctest-continue-on-failure --doctest-glob='*.md' --doctest-modules --ignore=docs/assets --pythonwarnings=ignore"
doctest_optionflags = [
  "ELLIPSIS",
  "IGNORE_EXCEPTION_DETAIL",
  "NORMALIZE_WHITESPACE",
  "NUMBER",
]

[tool.ruff.lint]  # --------------------------------------------------------------------

preview = true
ignore = [
  "C90",  # TODO(posita): someday...
  "CPY",
  "D",
  "DOC",
  "EM",
  "FIX",  # TODO(posita): run occasionally, or figure out how to make these warnings
  "PLC",
  "PLR",
  "PLW",  # TODO(posita): remove this
  "COM812",  # Trailing comma missing
  "E501",  # Line too long (... > ...)
  "RET505",  # Unnecessary `else` after `return` statement
  "RET506",  # Unnecessary `else` after `raise` statement
  "RUF002",  # Docstring contains ambiguous ...
  "RUF067",  # `__init__` module should only contain docstrings and re-exports
  "S101",  # Use of `assert` detected
  "S311",  # Standard pseudo-random generators are not suitable for cryptographic purposes
  "TD003",  # Missing issue link for this TODO  # TODO(posita): remove this after creating issues
  "TRY003",  # Avoid specifying long messages outside the exception class
  "UP007",  # Use `X | Y` for type annotations  # TODO(posita): remove after forward refs are properly supported
]
select = [
  "ALL",
]

[tool.versioningit.next-version]  # ----------------------------------------------------

method = "smallest-release"

[tool.versioningit.vcs]  # -------------------------------------------------------------

default-tag = "0.0.0"

[tool.versioningit.write]  # -----------------------------------------------------------

file = "dyce/_version.py"
template = '''__vers_str__ = "{version}"
__version__ = {version_tuple}
'''
