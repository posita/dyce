[project]  # ---------------------------------------------------------------------------

name = "dyce"
dynamic = ["version"]
description = "Simple Python tools for exploring dice outcomes and other finite discrete probabilities"
readme = {file = "README.md", content-type = "text/markdown; charset=UTF-8"}
license = "MIT"
license-files = ["LICENSE"]
authors = [{name = "Matt Bogosian", email = "matt@bogosian.net"}]
requires-python = ">=3.10"
dependencies = ["numerary~=0.4.3"]
classifiers = [
  "Topic :: Education",
  "Topic :: Games/Entertainment",
  "Topic :: Scientific/Engineering :: Mathematics",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Typing :: Typed",
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Intended Audience :: Education",
  "Intended Audience :: Science/Research",
  "Operating System :: OS Independent",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Programming Language :: Python :: Implementation :: CPython",
  "Programming Language :: Python :: Implementation :: PyPy",
]

[project.optional-dependencies]  # -----------------------------------------------------

dev = [
  "numpy",
  "pandas",
  "pre-commit",
  "sympy",
  "tox",
  "versioningit",
  # TODO(posita): Remove when retiring support for 3.10
  "tomli; python_version < '3.11'",
]

[project.urls]  # ----------------------------------------------------------------------

Homepage = "https://posita.github.io/dyce/"
"Source Repository" = "https://github.com/posita/dyce/"

[build-system]  # ----------------------------------------------------------------------

requires = ["setuptools>=61", "versioningit", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]  # -------------------------------------------------------------------

packages = ["dyce"]

[tool.setuptools.package-data]  # ------------------------------------------------------

dyce = ["py.typed"]

[tool.flake8]  # ------------------------------------------------------------------------

# See:
# * <https://pycodestyle.readthedocs.io/en/latest/intro.html#error-codes>
# * <https://flake8.readthedocs.io/en/latest/user/error-codes.html>
ignore = [
  "E203",  # whitespace before ':'
  "E501",  # line too long (... > ... characters)
  "E704",  # multiple statements on one line
  "W503",  # line break occurred before a binary operator
]

[tool.isort]  # ------------------------------------------------------------------------

# See <https://pycqa.github.io/isort/docs/configuration/profiles.html#black>
profile = "black"
# See <https://pycqa.github.io/isort/docs/configuration/options.html#skip-gitignore>
skip_gitignore = true

[tool.mypy]  # -------------------------------------------------------------------------

check_untyped_defs = true
# See <https://mypy.readthedocs.io/en/stable/config_file.html#confval-exclude>
exclude = "(?x)( (^|/)build/ )"
ignore_missing_imports = true
strict_optional = true
show_error_codes = true
warn_redundant_casts = true
warn_unused_configs = true

[tool.pytest.ini_options]  # -----------------------------------------------------------

addopts = "--doctest-continue-on-failure --doctest-glob='*.md' --doctest-modules --ignore=docs/assets --pythonwarnings=ignore"
doctest_optionflags = [
  "ELLIPSIS",
  "IGNORE_EXCEPTION_DETAIL",
  "NORMALIZE_WHITESPACE",
  "NUMBER",
]

[tool.versioningit.next-version]  # ----------------------------------------------------

method = "smallest-release"

[tool.versioningit.vcs]  # -------------------------------------------------------------

default-tag = "0.0.0"

[tool.versioningit.write]  # -----------------------------------------------------------

file = "dyce/_version.py"
template = '''__vers_str__ = "{version}"
__version__ = {version_tuple}
'''
